<body>

    <symbol id="ic-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></symbol>

    <symbol id="ic-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
    <symbol id="ic-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></symbol>
    <symbol id="ic-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></symbol>
    <symbol id="ic-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></symbol>
    <symbol id="ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></symbol>
    <symbol id="ic-image" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></symbol>

    <symbol id="ic-cloud-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></symbol>
    <symbol id="ic-key" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></symbol>
    <symbol id="ic-chev-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></symbol>
    <symbol id="ic-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></symbol>
    <symbol id="ic-hash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></symbol>
    <symbol id="ic-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></symbol>
    <symbol id="ic-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></symbol>
    <symbol id="ic-grip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="6" r="1"/><circle cx="8" cy="12" r="1"/><circle cx="8" cy="18" r="1"/><circle cx="14" cy="6" r="1"/><circle cx="14" cy="12" r="1"/><circle cx="14" cy="18" r="1"/></symbol>
    <symbol id="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></symbol>
    <symbol id="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></symbol>

  <!-- Token Modal -->
  <div id="token-modal" class="modal">
    <div class="modal-box">
      <div class="token-icon"><svg width="32" height="32"><use href="#ic-key"/></svg></div>
      <h2>访问认证</h2>
      <p class="modal-desc">请输入 API Token 以继续。可在 config.yaml 的 <code>auth.token</code> 处查看。</p>
      <input type="password" id="token-input" placeholder="粘贴 Token" autocomplete="off" />
      <button id="token-save" class="btn-primary">进 入</button>
      <p id="token-error" class="error"></p>
    </div>
  </div>

  <!-- App Layout -->
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <svg width="28" height="28" class="brand-icon"><use href="#ic-layers"/></svg>
        <span class="brand-text">IMGHOST</span>
      </div>

      <nav class="sidebar-nav" id="nav">
        <a href="#dashboard" data-view="dashboard" class="nav-item">
          <svg width="20" height="20"><use href="#ic-dashboard"/></svg>
          <span>仪表盘</span>
        </a>
        <a href="#upload" data-view="upload" class="nav-item">
          <svg width="20" height="20"><use href="#ic-upload"/></svg>
          <span>上传图片</span>
        </a>
        <a href="#manage" data-view="manage" class="nav-item">
          <svg width="20" height="20"><use href="#ic-images"/></svg>
          <span>图片管理</span>
        </a>
        <a href="#albums" data-view="albums" class="nav-item">
          <svg width="20" height="20"><use href="#ic-folder"/></svg>
          <span>相册</span>
        </a>
        <a href="#settings" data-view="settings" class="nav-item">
          <svg width="20" height="20"><use href="#ic-settings"/></svg>
          <span>设置</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="storage-widget">
          <div class="storage-header">
            <svg width="16" height="16"><use href="#ic-database"/></svg>
            <span>存储空间</span>
          </div>
          <div class="storage-bar"><div class="storage-fill" id="storage-fill"></div></div>
          <div class="storage-text">
            <span id="sidebar-size">0 B</span>
            <span id="sidebar-count">0 张图片</span>
          </div>
        </div>
        <button id="theme-toggle" class="theme-toggle">
          <svg width="16" height="16" class="icon-sun"><use href="#ic-sun"/></svg>
          <svg width="16" height="16" class="icon-moon"><use href="#ic-moon"/></svg>
          <span id="theme-text">深色模式</span>
        </button>
        <button id="clear-token" class="logout-btn">
          <svg width="16" height="16"><use href="#ic-logout"/></svg>
          <span>清除 Token</span>
        </button>
      </div>
    </aside>

    <!-- Main Area -->
    <main class="main">
      <header class="topbar">
        <h1 class="page-title" id="page-title">仪表盘</h1>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>

      <div class="content" id="view"></div>
    </main>
  </div>

  <!-- Image Detail Modal -->
  <div id="detail-modal" class="modal">
    <div class="modal-box detail-box">
      <button id="detail-close" class="modal-close"><svg width="20" height="20"><use href="#ic-close"/></svg></button>
      <img id="detail-img" class="detail-img" alt="" />
      <div class="detail-info">
        <div id="detail-name" class="detail-name"></div>
        <div id="detail-meta" class="detail-meta"></div>
        <div class="detail-url-row">
          <input type="text" id="detail-url" class="detail-url-input" readonly />
          <button id="detail-copy-url" class="btn-sm"><svg width="14" height="14"><use href="#ic-copy"/></svg></button>
        </div>
        <div class="detail-url-row">
          <input type="text" id="detail-alias" class="detail-url-input" placeholder="自定义别名，例如 my-photo.png" />
          <button id="detail-save-alias" class="btn-outline">保存别名</button>
        </div>
        <div class="detail-url-row">
          <input type="text" id="detail-alias-url" class="detail-url-input" readonly placeholder="保存别名后生成友好链接" />
          <button id="detail-copy-alias" class="btn-sm"><svg width="14" height="14"><use href="#ic-copy"/></svg></button>
        </div>
        <div class="detail-actions">
          <button id="detail-copy-url2" class="btn-outline">复制 URL</button>
          <button id="detail-copy-md" class="btn-outline">复制 Markdown</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Album Edit Modal -->
  <div id="album-edit-modal" class="modal">
    <div class="modal-box">
      <button id="album-edit-close" class="modal-close"><svg width="20" height="20"><use href="#ic-close"/></svg></button>
      <h2>编辑相册</h2>
      <form id="album-edit-form" class="vertical-form">
        <input type="hidden" id="album-edit-id" />
        <label>名称<input type="text" id="album-edit-name" required /></label>
        <label>描述<input type="text" id="album-edit-desc" /></label>
        <div class="form-actions">
          <button type="button" id="album-edit-cancel" class="btn-outline">取消</button>
          <button type="submit" class="btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="/app.js?v=20260709001"></script>
</body>
</html>
